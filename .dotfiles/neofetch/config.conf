CRT=$'\e[38;2;194;246;255m'
BLUE=$'\e[38;2;109;159;209m'
WHITE=$'\e[38;2;183;212;232m'
RESET=$'\e[0m'

print_info() {
    prin "${CRT}${USER}${CRT}@${HOSTNAME%%.*}${RESET}"
    prin "$(color 14)────────────────"

    prin "$(color 14)╭──────────── ${WHITE}Software$(color 14) ────────────"

    prin "$(color 14)│ ${WHITE}Besturingssysteem" \
        "${CRT}NixOS 26.05 (Yarara) x86_64${RESET}"

    info "$(color 14)│ ${WHITE}Kernel" kernel

    prin "$(color 14)│ ${WHITE}Pakketten" \
        "${CRT}$(nix-store --query --requisites /run/current-system | wc -l) (nixpkgs)${RESET}"

    info "$(color 14)│ ${WHITE}Shell" shell
    info "$(color 14)│ ${WHITE}Bureaubladomgeving" de
    info "$(color 14)│ ${WHITE}Terminal" term

    prin "$(color 14)├──────────── ${WHITE}Hardware$(color 14) ────────────"

    info "$(color 14)│ ${WHITE}CPU" cpu
    info "$(color 14)│ ${WHITE}GPU" gpu
    info "$(color 14)│ ${WHITE}Geheugen" memory

    prin "$(color 14)├──────────── ${WHITE}Actieve Tijd$(color 14) ────────"

    info "$(color 14)│" uptime

    prin "$(color 14)╰──────────────────────────────────"

    info cols
}

title_fqdn="off"
kernel_shorthand="on"
distro_shorthand="on"
